defaults:
  - _self_
  - data: tworoom
  - setup: null

# Path to the stage-1 .ckpt saved by ModelObjectCallBack (torch.save of JEPA object).
# Example: outputs/20240101_120000/lewm_epoch_100_object.ckpt
stage1_checkpoint: ???

output_model_name: hierarchical_lewm
subdir: ${now:%Y%m%d_%H%M%S}

seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny

train_split: 0.9

# Lightning Trainer — set devices: auto to use all visible GPUs (DDP),
# or devices: 1 for single-GPU / CPU runs.
trainer:
  max_epochs: ${stage2.n_epochs}
  accelerator: gpu
  devices: auto
  precision: bf16-mixed
  log_every_n_steps: 1
  strategy: ddp_find_unused_parameters_false
  accumulate_grad_batches: 1   # increase to simulate larger batch without more GPUs

loader:
  batch_size: 64
  num_workers: 6
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

# Stage-2 optimisation
stage2:
  lr: 5e-4
  n_epochs: 10
  freeze_encoder: True           # keep E and P^(1) frozen; only A_ψ and P^(2) are trained
  compile: True                  # torch.compile ActionEncoder + HighLevelPredictor (PyTorch 2+)

# HierarchicalLeWM architecture.
# num_preds is required by the data config group's num_steps interpolation.
wm:
  num_preds: 1
  history_size: 3
  embed_dim: 192          # must match the stage-1 embed_dim
  n_waypoints: 4          # N interior waypoints (6 total, matches PLDM Appendix B.4)
  latent_action_dim: 8    # d_L — matches PLDM Appendix B.4
  high_depth: 6
  high_heads: 16
  high_mlp_dim: 2048
  high_num_frames: 8      # positional-embedding buffer; >= n_waypoints + 2
  action_enc_hidden: 128
  action_enc_depth: 2
  action_enc_heads: 4

# Stage-2 needs longer windows than stage-1 (4 frames) so waypoints are meaningful.
# The training script injects this into cfg.data.dataset.num_steps before dataset init.
stage2_num_steps: 12   # span = 12 × frameskip(5) = 60 raw env steps, matches PLDM

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
