defaults:
  - _self_
  - data: tworoom
  - setup: null

# Path to the stage-1 .ckpt saved by ModelObjectCallBack (torch.save of JEPA object).
# Example: outputs/20240101_120000/lewm_epoch_100_object.ckpt
stage1_checkpoint: ???

output_model_name: hierarchical_lewm
subdir: ${now:%Y%m%d_%H%M%S}

seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny

train_split: 0.9

device: cuda

cache_batch_size: 1024   # batch size for the one-time embedding cache pass; increase to saturate VRAM
# Second GPU for the one-time embedding cache build. Set to "cuda:1" on a two-A100 node to
# split the ViT forward pass across both GPUs via threading (~2× faster). Ignored in DDP mode
# (torchrun), where each rank already encodes its own shard on its own GPU.
cache_extra_device: null

loader:
  batch_size: 512
  num_workers: 12
  persistent_workers: True
  prefetch_factor: 4
  pin_memory: True

# Stage-2 optimisation
stage2:
  lr: 5e-4                # 5x higher with CosineAnnealingLR scheduler over n_epochs
  n_epochs: 10            # PLDM-style short schedule; LR cosine-decays to 0
  freeze_encoder: True    # keep E and P^(1) frozen; only A_ψ and P^(2) are trained
  log_every_n_steps: 10   # W&B step-level logging frequency; epoch summary always logged
  ckpt_every_n_epochs: 1  # pickle the model object every N epochs (1 = every epoch)
  # Multi-step rollout (scheduled sampling) for P^(2). rollout_loss=False -> one-step
  # teacher forcing (original behaviour). When True, the teacher-forcing probability is
  # annealed ss_start -> ss_end over epochs so P^(2) is trained on its own rollouts and
  # penalised for compounding error (the fix for the H>=2 fidelity collapse).
  rollout_loss: False
  ss_start: 1.0           # teacher-forcing prob at epoch 0 (1.0 = fully teacher-forced)
  ss_end: 0.25            # teacher-forcing prob at final epoch (0.0 = full free-running)
  # Regularisation for A_ψ / P^(2) (held-out TF loss 0.84 vs train 0.17 -> overfitting).
  dropout: 0.0            # dropout inside A_ψ and P^(2) transformers
  weight_decay: 0.01      # AdamW weight decay on stage-2 params (default 0.01)
  # Checkpoint selection: "tf" = teacher-forced val_loss (every epoch, the old way);
  # "ar" = free-running rollout MSE (only computed every `ar_every` epochs — set
  # ar_every=1 if selecting by "ar").
  select_by: tf
  ar_every: 5             # run the (expensive) free-running AR val pass every N epochs
  use_amp: True           # bf16 autocast on CUDA — ~2x throughput, no grad scaler needed
  compile: False          # torch.compile A_ψ and P^(2); set True for long production runs

# HierarchicalLeWM architecture.
# num_preds is required by the data config group's num_steps interpolation.
wm:
  num_preds: 1
  history_size: 3
  embed_dim: 192          # must match the stage-1 embed_dim
  n_waypoints: 4          # N interior waypoints (6 total with endpoints, matches PLDM B.4)
  latent_action_dim: 8    # d_L — matches PLDM B.4; wider bottleneck for action info
  lambda_var: 0.0         # hinge variance penalty on macro-actions (0 = disabled; superseded by lambda_kl)
  lambda_kl: 0.01         # moment-matching to N(0,I) on A_ψ outputs: mean²+(std-1)²
  high_depth: 6
  high_heads: 16
  high_mlp_dim: 2048
  high_num_frames: 8      # positional-embedding buffer; >= n_waypoints + 2
  action_enc_hidden: 128
  action_enc_depth: 2
  action_enc_heads: 4

# Stage-2 needs longer windows than stage-1 (4 frames) so waypoints are meaningful.
# The training script injects this into cfg.data.dataset.num_steps before dataset init.
stage2_num_steps: 12   # span = 12 × frameskip(5) = 60 raw env steps, matches PLDM

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm
    name: ${data.dataset.name}_wp${wm.n_waypoints}_dL${wm.latent_action_dim}_lr${stage2.lr}_kl${wm.lambda_kl}_bs${loader.batch_size}_ep${stage2.n_epochs}_rl${stage2.rollout_loss}
    id: ${subdir}
    resume: allow
