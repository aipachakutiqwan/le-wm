defaults:
  - _self_
  - data: tworoom
  - setup: null


# Path to the stage-1 .ckpt saved by ModelObjectCallBack (torch.save of JEPA object).
# Example: outputs/20240101_120000/lewm_epoch_100_object.ckpt
stage1_checkpoint: ???

output_model_name: hierarchical_lewm
subdir: ${now:%Y%m%d_%H%M%S}

seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny

train_split: 0.9

trainer:
  max_epochs: ${stage2.n_epochs}
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  strategy: ddp_find_unused_parameters_true

loader:
  batch_size: 64
  num_workers: 6
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

# Stage-2 optimisation
stage2:
  lr: 1e-4
  n_epochs: 50
  freeze_encoder: True    # keep E and P^(1) frozen; only A_ψ and P^(2) are trained

# HierarchicalLeWM architecture.
# num_preds is required by the data config group's num_steps interpolation.
wm:
  num_preds: 1
  history_size: 3
  embed_dim: 192          # must match the stage-1 embed_dim
  n_waypoints: 3          # N interior waypoints (HWM default)
  latent_action_dim: 4    # d_L — sweep this first when tuning
  lambda_sigreg: 0.09      # SIGReg weight on P^(2) predicted waypoints (0 = disabled)
                          # enables: 0.01–0.1; keeps predicted subgoals in Gaussian support
  high_depth: 6
  high_heads: 16
  high_mlp_dim: 2048
  high_num_frames: 8      # positional-embedding buffer; >= n_waypoints + 2
  action_enc_hidden: 128
  action_enc_depth: 2
  action_enc_heads: 4

# Stage-2 window aligned to eval planning horizon: (N+1) * h_low = 4 * 10 = 40 frames.
# Ensures each training segment (~10 steps) matches the low-level CEM rollout length.
stage2_num_steps: 40

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
