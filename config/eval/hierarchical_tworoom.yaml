defaults:
  - _self_

# Path to stage-2 checkpoint (HierarchicalLeWM object saved by train_hierarchical.py).
checkpoint: ???

device: cpu  # override with device=cuda when a GPU is available

seed: 42

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # set programmatically to 2 * eval_budget
  history_size: 3
  frame_skip: 1            # policy handles frameskip internally via action queue

dataset:
  name: tworoom
  keys_to_cache:
    - action
    - proprio

# Two-level CEM hyperparameters (mirror defaults from hierarchical_plan.plan)
plan:
  H_high: 5
  h_low: 3                  # H_high × h_low + 1 = 5 × 3 + 1 = 16 = stage2_num_steps
  outer_samples: 2000        # paper Diverse Maze value
  inner_samples: 1000        # paper Diverse Maze value
  outer_iters: 10
  inner_iters: 30
  outer_var_ema: 0.9         # used only when use_mppi: false
  inner_var_ema: 0.8         # used only when use_mppi: false
  use_mppi: true             # paper algorithm for navigation tasks
  mppi_sigma_outer: 1.0      # noise std for macro-action space (paper maze: 10; tune to cost scale)
  mppi_sigma_inner: 0.5      # noise std for primitive action space
  mppi_lam: 1.0              # temperature — scale-invariant (λ=1 → e^{-1} at 1σ above best)
  inner_goal_alpha: 0.0     # auxiliary z_goal pull in inner cost (0 = disabled)

# MPC loop config fed to swm.PlanConfig
plan_config:
  horizon: 3          # one high-level step = h_low=3 primitive actions
  receding_horizon: 3  # replan every h_low steps (after queue drains)
  history_len: 1
  action_block: 3     # matches h_low; frameskip handled by world.frame_skip

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50          # primitive steps; matches tworoom flat eval for direct comparison
  img_size: 224
  dataset_name: tworoom
  callables:
    - method: _set_state
      args:
        state:
          value: proprio
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_proprio

output:
  filename: hierarchical_results.txt
