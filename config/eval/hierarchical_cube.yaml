defaults:
  - _self_

# Path to stage-2 checkpoint (HierarchicalLeWM object saved by train_hierarchical.py).
checkpoint: ???

device: cpu  # override with device=cuda when a GPU is available

seed: 42

world:
  env_name: swm/OGBCube-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: 100   # must be >= eval_budget (primitive steps)
  history_size: 1
  frame_skip: 1            # policy handles frameskip internally via action queue
  env_type: single
  ob_type: states
  multiview: False
  width: 224
  height: 224
  visualize_info: False
  terminate_at_goal: True

dataset:
  name: ogbench/cube_single_expert
  keys_to_cache:
    - action
    - observation

# Two-level CEM hyperparameters (mirror defaults from hierarchical_plan.plan)
plan:
  H_high: 1
  h_low: 10
  outer_samples: 512
  inner_samples: 256
  outer_iters: 5
  inner_iters: 30

# MPC loop config fed to swm.PlanConfig
plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5          # frameskip

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/cube_single_expert
  callables:
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel
    - method: set_target_pos
      args:
        cube_id:
          value: 0
          in_dataset: False
        target_pos:
          value: goal_privileged_block_0_pos
        target_quat:
          value: goal_privileged_block_0_quat

output:
  filename: hierarchical_cube_results.txt
