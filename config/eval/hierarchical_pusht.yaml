defaults:
  - _self_

# Path to stage-2 checkpoint (HierarchicalLeWM object saved by train_hierarchical.py).
checkpoint: ???

device: cpu  # override with device=cuda when a GPU is available

seed: 42

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # set programmatically to 2 * eval_budget
  history_size: 1
  frame_skip: 1            # policy handles frameskip internally via action queue

dataset:
  name: pusht_expert_train
  keys_to_cache:
    - action
    - proprio
    - state

# Two-level CEM hyperparameters (mirror defaults from hierarchical_plan.plan)
plan:
  H_high: 3
  h_low: 10
  outer_samples: 512
  inner_samples: 256
  outer_iters: 5
  inner_iters: 5

# MPC loop config — only used for the budget assertion in plan_hierarchical.py
plan_config:
  horizon: 1
  receding_horizon: 1
  history_len: 1
  action_block: 1

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50          # primitive steps; matches pusht flat eval for direct comparison
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output: {}  # filename is built automatically: {env}_H{H_high}_h{h_low}_oi{oi}_ii{ii}_n{n}_seed{seed}_sr{sr}.txt
