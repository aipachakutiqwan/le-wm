<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" font-family="sans-serif">

  <!-- Background -->
  <rect width="860" height="580" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">World Model ↔ Real Environment</text>

  <!-- ═══════════════════════════════════════════════
       LEFT ZONE: REAL ENVIRONMENT
  ═══════════════════════════════════════════════ -->
  <rect x="16" y="48" width="220" height="510" rx="10" fill="#e8f5e9" stroke="#52b788" stroke-width="2"/>
  <text x="126" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b4332">Real Environment</text>
  <text x="126" y="84" text-anchor="middle" font-size="10" fill="#2d6a4f">TwoRoom-v1</text>

  <!-- o1 box -->
  <rect x="56" y="100" width="140" height="44" rx="8" fill="#4cc9f0" opacity="0.9"/>
  <text x="126" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">o₁</text>
  <text x="126" y="136" text-anchor="middle" font-size="9" fill="#e0f7fa">current observation</text>

  <!-- og box -->
  <rect x="56" y="420" width="140" height="44" rx="8" fill="#f72585" opacity="0.85"/>
  <text x="126" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">o_g</text>
  <text x="126" y="456" text-anchor="middle" font-size="9" fill="#ffe0f0">goal observation (fixed)</text>

  <!-- env steps block -->
  <rect x="36" y="290" width="180" height="100" rx="8" fill="#fff" stroke="#52b788" stroke-width="1.5"/>
  <text x="126" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b4332">Execute actions</text>
  <text x="126" y="330" text-anchor="middle" font-size="10" fill="#2d6a4f">25 real env steps</text>
  <text x="126" y="348" text-anchor="middle" font-size="10" fill="#2d6a4f">one action dequeued</text>
  <text x="126" y="364" text-anchor="middle" font-size="10" fill="#2d6a4f">per step</text>
  <text x="126" y="382" text-anchor="middle" font-size="9" fill="#52b788">frame_skip: 1</text>

  <!-- ═══════════════════════════════════════════════
       RIGHT ZONE: WORLD MODEL (IMAGINED)
  ═══════════════════════════════════════════════ -->
  <rect x="420" y="48" width="424" height="510" rx="10" fill="#eef0fb" stroke="#4361ee" stroke-width="2"/>
  <text x="632" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a0ca3">World Model  (imagined space)</text>
  <text x="632" y="84" text-anchor="middle" font-size="10" fill="#4361ee">no real interaction — latent only</text>

  <!-- Encoder o1 -->
  <rect x="434" y="96" width="110" height="36" rx="7" fill="#4cc9f0" opacity="0.85"/>
  <text x="489" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Encoder</text>
  <text x="489" y="126" text-anchor="middle" font-size="9" fill="#e0f7fa">o₁ → z₁  (192-dim)</text>

  <!-- Encoder og -->
  <rect x="434" y="418" width="110" height="36" rx="7" fill="#f72585" opacity="0.8"/>
  <text x="489" y="434" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Encoder</text>
  <text x="489" y="448" text-anchor="middle" font-size="9" fill="#ffe0f0">o_g → z_g  (192-dim)</text>

  <!-- CEM box -->
  <rect x="434" y="160" width="390" height="230" rx="8" fill="#fff" stroke="#4361ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="629" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#4361ee">CEM Solver  (n_steps: 30)</text>

  <!-- sample -->
  <rect x="448" y="190" width="362" height="36" rx="6" fill="#dbe4ff"/>
  <text x="629" y="207" text-anchor="middle" font-size="10" font-weight="bold" fill="#3a0ca3">① Sample 300 action candidates</text>
  <text x="629" y="220" text-anchor="middle" font-size="9" fill="#3a0ca3">shape: (300, horizon=5, action_dim×5)</text>

  <!-- predictor rollout -->
  <rect x="448" y="236" width="362" height="50" rx="6" fill="#c5cae9"/>
  <text x="629" y="253" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">② Predictor rollout  H=5 imagined steps</text>
  <text x="629" y="268" text-anchor="middle" font-size="9" fill="#1a237e">z₁ + a₁ → ẑ₂  ·  ẑ₂ + a₂ → ẑ₃  ·  …  → ẑ₅</text>
  <text x="629" y="281" text-anchor="middle" font-size="9" fill="#1a237e">300 candidates rolled out in parallel</text>

  <!-- cost -->
  <rect x="448" y="296" width="362" height="36" rx="6" fill="#fce4ec"/>
  <text x="629" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#880e4f">③ Cost  =  MSE(ẑ₅,  z_g)</text>
  <text x="629" y="326" text-anchor="middle" font-size="9" fill="#880e4f">one scalar per candidate  →  (300,)</text>

  <!-- elite -->
  <rect x="448" y="342" width="362" height="36" rx="6" fill="#e8f5e9"/>
  <text x="629" y="359" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b4332">④ Keep top 30 elites  (topk: 30)</text>
  <text x="629" y="372" text-anchor="middle" font-size="9" fill="#1b4332">refit mean &amp; variance  →  repeat ①</text>

  <!-- buffer -->
  <rect x="490" y="470" width="274" height="36" rx="7" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="627" y="487" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17">Action buffer</text>
  <text x="627" y="502" text-anchor="middle" font-size="9" fill="#f57f17">25 actions queued  (5 latent × 5 primitive)</text>

  <!-- ═══════════════════════════════════════════════
       MIDDLE ZONE: ENCODER BOUNDARY
  ═══════════════════════════════════════════════ -->
  <rect x="244" y="48" width="172" height="510" rx="0" fill="#f0f4ff" stroke="none"/>
  <line x1="244" y1="48" x2="244" y2="558" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="416" y1="48" x2="416" y2="558" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="330" y="68" text-anchor="middle" font-size="10" fill="#6c757d">— boundary —</text>

  <!-- ═══════════════════════════════════════════════
       ARROWS
  ═══════════════════════════════════════════════ -->

  <!-- o1 → Encoder -->
  <line x1="196" y1="122" x2="434" y2="114" stroke="#4cc9f0" stroke-width="2" marker-end="url(#blueArr)"/>
  <text x="315" y="108" text-anchor="middle" font-size="9" fill="#0077b6">pixels (224×224)</text>

  <!-- og → Encoder og -->
  <line x1="196" y1="440" x2="434" y2="436" stroke="#f72585" stroke-width="2" marker-end="url(#pinkArr)"/>
  <text x="315" y="430" text-anchor="middle" font-size="9" fill="#c9184a">pixels (224×224)</text>

  <!-- Encoder o1 → CEM (z1) -->
  <line x1="489" y1="132" x2="489" y2="160" stroke="#3a0ca3" stroke-width="1.5" marker-end="url(#darkArr)"/>
  <text x="510" y="150" font-size="9" fill="#3a0ca3">z₁</text>

  <!-- Encoder og → cost (zg) -->
  <line x1="529" y1="418" x2="590" y2="332" stroke="#880e4f" stroke-width="1.5" marker-end="url(#darkPinkArr)"/>
  <text x="570" y="395" font-size="9" fill="#880e4f">z_g</text>

  <!-- CEM → buffer -->
  <line x1="629" y1="390" x2="629" y2="470" stroke="#f9a825" stroke-width="2" marker-end="url(#yellowArr)"/>
  <text x="640" y="435" font-size="9" fill="#f57f17">best actions</text>

  <!-- buffer → real env (execute) -->
  <line x1="490" y1="488" x2="216" y2="350" stroke="#52b788" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#greenArr)"/>
  <text x="340" y="460" text-anchor="middle" font-size="9" fill="#1b4332">dequeue 1 action/step</text>

  <!-- real env → new o1 (feedback loop) -->
  <path d="M126,290 L126,200 L126,144" fill="none" stroke="#52b788" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#greenArr)"/>
  <text x="22" y="225" font-size="9" fill="#1b4332">new o₁</text>
  <text x="22" y="237" font-size="9" fill="#1b4332">after 25</text>
  <text x="22" y="249" font-size="9" fill="#1b4332">steps</text>

  <!-- ═══════════════════════════════════════════════
       LEGEND / ANNOTATIONS
  ═══════════════════════════════════════════════ -->
  <rect x="16" y="562" width="828" height="0" fill="none"/>

  <!-- arrowhead defs -->
  <defs>
    <marker id="blueArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4cc9f0"/>
    </marker>
    <marker id="pinkArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f72585"/>
    </marker>
    <marker id="darkArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3a0ca3"/>
    </marker>
    <marker id="darkPinkArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#880e4f"/>
    </marker>
    <marker id="yellowArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f9a825"/>
    </marker>
    <marker id="greenArr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#52b788"/>
    </marker>
  </defs>

</svg>
